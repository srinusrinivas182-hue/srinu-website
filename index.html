<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CMMS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="brand">CMMS</div>
  <div id="clock"></div>
</header>

<div class="layout">

  <aside class="sidebar">
    <button class="nav active" data-page="dashboard">Dashboard</button>
    <button class="nav" data-page="workorders">Work Orders</button>
  </aside>

  <main class="main">

    <!-- DASHBOARD -->
    <section id="dashboard" class="page">
      <h1>Dashboard</h1>
      <div class="card">
        <div>Open: <span id="kpiOpen">0</span></div>
        <div>In Progress: <span id="kpiProg">0</span></div>
        <div>Completed: <span id="kpiDone">0</span></div>
      </div>
    </section>

    <!-- WORK ORDERS -->
    <section id="workorders" class="page hidden">
      <h1>Work Orders</h1>

      <div class="card">
        <input id="woTitle" placeholder="Title">
        <input id="woAsset" placeholder="Asset">
        <select id="woPriority">
          <option>Low</option>
          <option selected>Medium</option>
          <option>High</option>
        </select>
        <select id="woStatus">
          <option selected>Open</option>
          <option>In Progress</option>
          <option>Completed</option>
        </select>
        <textarea id="woDesc" placeholder="Description"></textarea>
        <button id="addWO">Add Work Order</button>
      </div>

      <div class="card">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Title</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="woTable"></tbody>
        </table>
      </div>

    </section>

  </main>
</div>

<!-- EDIT MODAL -->
<div class="modal hidden" id="editModal">
  <div class="modalBox">
    <div class="modalTop">
      <h2>Edit Work Order</h2>
      <button type="button" id="closeModal">X</button>
    </div>

    <input id="editTitle">
    <input id="editAsset">

    <select id="editPriority">
      <option>Low</option>
      <option>Medium</option>
      <option>High</option>
    </select>

    <select id="editStatus">
      <option>Open</option>
      <option>In Progress</option>
      <option>Completed</option>
    </select>

    <textarea id="editDesc"></textarea>
    <button type="button" id="saveEdit">Save</button>
  </div>
</div>

<!-- CACHE BUST -->
<script src="app.js?v=10"></script>
</body>
</html>
